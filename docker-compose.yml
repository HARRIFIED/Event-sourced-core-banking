version: '3.9'

services:
  app:
    build: .
    container_name: core-banking-app
    depends_on:
      - postgres
      - kafka
    environment:
      PORT: 3000
      EVENT_STORE_KIND: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
      POSTGRES_DB: banking
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: core-banking-app
    ports:
      - '3000:3000'
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: core-banking-postgres
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: core-banking-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    networks:
      - internal

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: core-banking-kafka
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
      - '29092:29092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
