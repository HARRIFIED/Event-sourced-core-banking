version: '3.9'

services:
  pgadmin-corebanking:
    image: dpage/pgadmin4
    container_name: pgadmin-corebanking
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - internal

